apiVersion: apps/v1
kind: Deployment
metadata:
  name: flower-app-deployment
  labels:
    first: app
spec: 
  replicas: 3
  selector: 
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - image: priyakirana14/sre-web-app:v1.0.0
          name: flower-cont
          ports:
            - containerPort: 3015
---
apiVersion: v1
kind: Service
metadata:
  name: flower-app-service

//PUT THE LABELS WHICH ARE USED IN TEMPLATES 
spec:
  selector:
    app: web
  ports:
    - protocol: TCP
      port: 80           #SERVICE H-PORT NUMBER to expose
      targetPort: 3015     #same port as above container port
  type: ClusterIP